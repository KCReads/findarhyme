<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Find My Rhyme</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>
  <header class="app-header">
    <div class="header-inner">
      <h1><span class="title-icon">🎵📚</span> Find My Rhyme</h1>

      <nav class="nav-bar">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="policy.html">Policy</a>
        <a href="https://forms.gle/4j4qhV8JBzf7BU8N7" target="_blank" rel="noopener noreferrer">💡 Suggestions</a>
        <a href="https://forms.gle/k3yuZy2Xrfu323mb9" target="_blank" rel="noopener noreferrer">⚠️ Report</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="controls">
      <div class="control-row">
        <input id="search" type="text" placeholder="Search..." />
        <select id="searchMode">
          <option value="all">All</option>
          <option value="title">Title</option>
          <option value="keywords">Keywords</option>
          <option value="language">Language</option>
          <option value="creator">Creator</option>
        </select>
      </div>

      <div class="favorites-row">
        <div class="favorites">
          <input type="checkbox" id="favoritesOnly" />
          <label for="favoritesOnly">Favorites only</label>
        </div>

        <div class="favorites">
          <input type="checkbox" id="favoritesFirst" />
          <label for="favoritesFirst">Favorites first</label>
        </div>

        <div class="favorites">
          <input type="checkbox" id="recentOnly" />
          <label for="recentOnly">Recent only</label>
        </div>

        <div class="favorites">
          <input type="checkbox" id="recentFirst" />
          <label for="recentFirst">Recent first</label>
        </div>
      </div>

      <div class="email-tools">
        <input type="email" id="emailAddress" placeholder="Your email address" />
        <button id="emailFavoritesBtn" type="button">Email my favorites</button>
        <button id="copyFavoritesBtn" type="button" class="secondary-btn">Copy favorites</button>
        <button id="clearFavoritesBtn" type="button" class="secondary-btn">Clear favorites</button>
      </div>

      <div class="favorites-note">
        Favorites and recent activity are saved on your device only.
      </div>
    </section>

    <div id="list"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
