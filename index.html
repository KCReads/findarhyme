<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find a Rhyme</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <img src="find_a_rhyme_logo.png" alt="Find a Rhyme logo" class="logo" />
        <h1 class="brand-title">
          Find a Rhyme
          <span class="tagline">Less searching. More singing.</span>
          
        </h1>
      </div>

      <button
        class="menu-toggle"
        id="menuToggle"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="navBar"
      >
        ☰
      </button>

     <nav class="nav-bar" id="navBar">
  <a href="index.html" class="active"><span class="menu-icon">🏠</span>Home</a>
  <a href="about.html"><span class="menu-icon">👤</span>About</a>
  <a href="policy.html"><span class="menu-icon">📜</span>Policy &amp; Disclaimer</a>
  <a href="contact.html"><span class="menu-icon">✉️</span>Contact</a>
</nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="controls">
      <div class="control-row">
        <input
          type="text"
          id="search"
          placeholder="Search titles, creators, keywords, or language"
          aria-label="Search"
        />

        <select id="searchMode" aria-label="Search mode">
          <option value="all">Search All</option>
          <option value="title">Title</option>
          <option value="creator">Creator</option>
          <option value="keywords">Keywords</option>
          <option value="language">Language</option>
        </select>
      </div>

      <div class="control-row favorites-row">
        <label class="toggle-filter">
          <input type="checkbox" id="favoritesOnly" />
          Favorites Only
        </label>

        <label class="toggle-filter">
          <input type="checkbox" id="favoritesFirst" />
          Favorites First
        </label>

        <label class="toggle-filter">
          <input type="checkbox" id="recentOnly" />
          Recent Only
        </label>

        <label class="toggle-filter">
          <input type="checkbox" id="recentFirst" />
          Recent First
        </label>

        <label class="toggle-filter">
          <input type="checkbox" id="excludeAI" />
          Exclude AI-Supported
        </label>

        <label class="toggle-filter">
          <input type="checkbox" id="excludeProblematic" />
          Exclude Problematic History
        </label>
      </div>

      <div class="email-tools">
        <input
          type="email"
          id="emailAddress"
          placeholder="Email address for favorites"
          aria-label="Email address"
        />
        <button id="emailFavoritesBtn" type="button">Email Favorites</button>
        <button id="copyFavoritesBtn" type="button" class="secondary-btn">Copy Favorites</button>
        <button id="clearFavoritesBtn" type="button" class="secondary-btn">Clear Favorites</button>
      </div>

      <div class="favorites-note">
        Click a keyword or language tag to search by it. Click the star to save favorites.
      </div>
    </section>

    <section id="list" aria-live="polite"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
